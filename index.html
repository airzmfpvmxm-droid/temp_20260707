<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>농구 덕후 타이머</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Arial Black", "Pretendard", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.16), transparent 30%),
        linear-gradient(135deg, #111 0%, #1b1b1b 45%, #8b0000 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #111;
      overflow: hidden;
    }

    .court-line {
      position: absolute;
      width: 560px;
      height: 560px;
      border: 4px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      top: -170px;
      right: -150px;
    }

    .court-line::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border: 4px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      left: 135px;
      top: 135px;
    }

    .speed-lines {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(115deg, transparent 0%, transparent 45%, rgba(255,255,255,0.09) 46%, transparent 47%),
        linear-gradient(120deg, transparent 0%, transparent 55%, rgba(255,255,255,0.08) 56%, transparent 57%),
        linear-gradient(130deg, transparent 0%, transparent 65%, rgba(255,255,255,0.07) 66%, transparent 67%);
      pointer-events: none;
    }

    .app {
      width: 420px;
      background: #f7f2e8;
      border: 5px solid #111;
      box-shadow: 14px 14px 0 #000;
      border-radius: 8px;
      padding: 24px;
      position: relative;
      z-index: 1;
      transform: rotate(-1deg);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px dashed rgba(0, 0, 0, 0.18);
      pointer-events: none;
    }

    .label {
      display: inline-block;
      background: #111;
      color: #fff;
      padding: 6px 12px;
      font-size: 13px;
      letter-spacing: 1px;
      transform: rotate(-2deg);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      color: #d71920;
      text-shadow: 3px 3px 0 #111;
      letter-spacing: -1px;
    }

    .subtitle {
      margin: 12px 0 18px;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      font-weight: 800;
      color: #333;
      font-size: 14px;
    }

    .inputs {
      display: flex;
      gap: 10px;
      margin: 18px 0;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      text-align: center;
      border: 3px solid #111;
      background: #fff;
      font-weight: 900;
      outline: none;
    }

    input:focus {
      border-color: #d71920;
      box-shadow: 4px 4px 0 #111;
    }

    .preset-row,
    .button-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 3px solid #111;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 4px 4px 0 #111;
      transition: 0.12s;
      font-family: inherit;
    }

    button:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    .preset {
      background: #fff;
      padding: 9px 12px;
      font-size: 13px;
    }

    .timer-grid {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr;
      gap: 12px;
      margin: 18px 0;
    }

    .display-panel {
      background: #111;
      border: 4px solid #d71920;
      padding: 16px 10px;
      color: #fff;
      text-align: center;
      box-shadow: inset 0 0 0 3px #fff;
    }

    .shot-panel {
      background: #180000;
      border: 4px solid #ffdf55;
      padding: 16px 10px;
      color: #fff;
      text-align: center;
      box-shadow: inset 0 0 0 3px #111;
    }

    .panel-title {
      font-size: 12px;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #ffdf55;
    }

    .time-display {
      font-size: 54px;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 4px 4px 0 #d71920;
    }

    .shot-display {
      font-size: 54px;
      letter-spacing: 1px;
      color: #ffdf55;
      text-shadow: 4px 4px 0 #d71920;
    }

    .status {
      margin-top: 8px;
      min-height: 22px;
      color: #ffdf55;
      font-size: 13px;
    }

    .start {
      background: #d71920;
      color: #fff;
      padding: 13px 16px;
    }

    .pause {
      background: #ffdf55;
      color: #111;
      padding: 13px 16px;
    }

    .reset {
      background: #111;
      color: #fff;
      padding: 13px 16px;
    }

    .turnover {
      background: #e76f1e;
      color: #111;
      padding: 13px 16px;
      font-size: 15px;
    }

    .quote {
      margin-top: 22px;
      background: #fff;
      border: 3px solid #111;
      padding: 12px;
      font-size: 14px;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      font-weight: 800;
      position: relative;
    }

    .quote::after {
      content: "";
      position: absolute;
      bottom: -14px;
      left: 24px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-right: 3px solid #111;
      border-bottom: 3px solid #111;
      transform: rotate(45deg);
    }

    .basketball {
      position: absolute;
      width: 72px;
      height: 72px;
      right: -28px;
      top: -32px;
      background: #e76f1e;
      border: 4px solid #111;
      border-radius: 50%;
      box-shadow: 5px 5px 0 #000;
      overflow: hidden;
    }

    .basketball::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 4px;
      background: #111;
      top: 34px;
      left: 0;
    }

    .basketball::after {
      content: "";
      position: absolute;
      width: 4px;
      height: 100%;
      background: #111;
      left: 34px;
      top: 0;
    }

    .arc-left,
    .arc-right {
      position: absolute;
      width: 52px;
      height: 82px;
      border: 4px solid #111;
      border-radius: 50%;
      top: -8px;
      background: transparent;
    }

    .arc-left {
      left: -28px;
    }

    .arc-right {
      right: -28px;
    }

    .danger {
      animation: dangerFlash 0.35s infinite alternate;
    }

    .shot-danger {
      animation: shotFlash 0.3s infinite alternate;
    }

    @keyframes dangerFlash {
      from {
        background: #111;
      }
      to {
        background: #d71920;
      }
    }

    @keyframes shotFlash {
      from {
        background: #180000;
      }
      to {
        background: #d71920;
      }
    }

    @media (max-width: 480px) {
      .app {
        width: 90%;
        padding: 20px;
      }

      h1 {
        font-size: 29px;
      }

      .timer-grid {
        grid-template-columns: 1fr;
      }

      .time-display,
      .shot-display {
        font-size: 50px;
      }
    }
  </style>
</head>

<body>
  <div class="court-line"></div>
  <div class="speed-lines"></div>

  <main class="app">
    <div class="basketball">
      <div class="arc-left"></div>
      <div class="arc-right"></div>
    </div>

    <div class="label">BASKETBALL TIMER</div>
    <h1>포기를 모르는<br />타이머</h1>
    <p class="subtitle">메인 시간과 24초 공격 제한을 동시에 관리하는 농구 덕후용 타이머.</p>

    <div class="inputs">
      <input type="number" id="minutes" placeholder="분" min="0" />
      <input type="number" id="seconds" placeholder="초" min="0" max="59" />
    </div>

    <div class="preset-row">
      <button class="preset" onclick="setPreset(60)">1분 작전타임</button>
      <button class="preset" onclick="setPreset(300)">5분 경기</button>
      <button class="preset" onclick="setPreset(600)">10분 쿼터</button>
    </div>

    <section class="timer-grid">
      <div class="display-panel" id="mainPanel">
        <div class="panel-title">GAME CLOCK</div>
        <div class="time-display" id="mainDisplay">00:00</div>
        <div class="status" id="status">코트 위에 설 준비 완료.</div>
      </div>

      <div class="shot-panel" id="shotPanel">
        <div class="panel-title">SHOT CLOCK</div>
        <div class="shot-display" id="shotDisplay">24</div>
        <div class="status">24초 공격</div>
      </div>
    </section>

    <div class="button-row">
      <button class="start" onclick="startTimer()">START</button>
      <button class="pause" onclick="pauseTimer()">PAUSE</button>
      <button class="turnover" onclick="turnover()">턴오버</button>
      <button class="reset" onclick="resetTimer()">RESET</button>
    </div>

    <div class="quote" id="quote">
      “24초 안에 승부를 봐라.”
    </div>
  </main>

  <script>
    let mainSeconds = 0;
    let shotSeconds = 24;
    let timerInterval = null;
    let isRunning = false;

    const SHOT_CLOCK_START = 24;

    const mainDisplay = document.getElementById("mainDisplay");
    const shotDisplay = document.getElementById("shotDisplay");
    const statusText = document.getElementById("status");
    const quote = document.getElementById("quote");
    const mainPanel = document.getElementById("mainPanel");
    const shotPanel = document.getElementById("shotPanel");

    const quotes = [
      "“리바운드를 지배하는 자, 시간을 지배한다.”",
      "“버저가 울릴 때까지 멈추지 말기.”",
      "“천재는 시간을 허투루 쓰지 않는다.”",
      "“24초 안에 결판낸다.”",
      "“공격권을 잃는 순간, 흐름도 넘어간다.”"
    ];

    function updateDisplay() {
      const minutes = Math.floor(mainSeconds / 60);
      const seconds = mainSeconds % 60;

      mainDisplay.textContent =
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0");

      shotDisplay.textContent = String(shotSeconds).padStart(2, "0");

      if (mainSeconds > 0 && mainSeconds <= 10) {
        mainPanel.classList.add("danger");
      } else {
        mainPanel.classList.remove("danger");
      }

      if (shotSeconds > 0 && shotSeconds <= 5) {
        shotPanel.classList.add("shot-danger");
      } else {
        shotPanel.classList.remove("shot-danger");
      }
    }

    function getInputTime() {
      const minutes = Number(document.getElementById("minutes").value) || 0;
      const seconds = Number(document.getElementById("seconds").value) || 0;
      return minutes * 60 + seconds;
    }

    function startTimer() {
      if (isRunning) return;

      if (mainSeconds === 0) {
        mainSeconds = getInputTime();
        shotSeconds = SHOT_CLOCK_START;
      }

      if (mainSeconds <= 0) {
        statusText.textContent = "먼저 경기 시간을 입력해!";
        quote.textContent = "“작전 없이 코트에 나설 순 없지.”";
        updateDisplay();
        return;
      }

      if (shotSeconds <= 0) {
        shotSeconds = SHOT_CLOCK_START;
      }

      isRunning = true;
      statusText.textContent = "경기 시작. 24초 공격 제한 작동 중.";
      quote.textContent = randomQuote();

      timerInterval = setInterval(() => {
        mainSeconds--;
        shotSeconds--;

        updateDisplay();

        if (shotSeconds <= 0 && mainSeconds > 0) {
          stopByShotClockViolation();
          return;
        }

        if (mainSeconds <= 0) {
          finishGameClock();
          return;
        }
      }, 1000);

      updateDisplay();
    }

    function pauseTimer() {
      if (!isRunning) return;

      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;

      statusText.textContent = "작전타임. 전체 시간이 일시정지됨.";
      quote.textContent = "“호흡을 고르고 다시 들어가자.”";
      updateDisplay();
    }

    function turnover() {
      if (!isRunning) {
        statusText.textContent = "경기가 시작되면 턴오버를 사용할 수 있어.";
        quote.textContent = "“아직 공이 코트에 오르지 않았다.”";
        return;
      }

      shotSeconds = SHOT_CLOCK_START;
      statusText.textContent = "턴오버! 24초 타이머 리셋.";
      quote.textContent = "“공격권이 넘어갔다. 다시 24초.”";
      updateDisplay();
      playResetSound();
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;

      mainSeconds = 0;
      shotSeconds = SHOT_CLOCK_START;

      document.getElementById("minutes").value = "";
      document.getElementById("seconds").value = "";

      statusText.textContent = "코트 위에 설 준비 완료.";
      quote.textContent = "“24초 안에 승부를 봐라.”";
      updateDisplay();
    }

    function setPreset(seconds) {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;

      mainSeconds = seconds;
      shotSeconds = SHOT_CLOCK_START;

      document.getElementById("minutes").value = Math.floor(seconds / 60);
      document.getElementById("seconds").value = seconds % 60;

      statusText.textContent = "경기 시간 세팅 완료. 24초 타이머 준비.";
      quote.textContent = randomQuote();
      updateDisplay();
    }

    function stopByShotClockViolation() {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;

      shotSeconds = 0;
      statusText.textContent = "24초 바이얼레이션! 전체 시간이 멈췄습니다.";
      quote.textContent = "“턴오버 실패. 공격권 상실.”";
      updateDisplay();
      playViolationSound();
    }

    function finishGameClock() {
      clearInterval(timerInterval);
      timerInterval = null;
      isRunning = false;

      mainSeconds = 0;
      statusText.textContent = "BUZZER BEATER! 전체 시간이 끝났습니다.";
      quote.textContent = "“오늘도 한 경기를 끝냈다.”";
      updateDisplay();
      playFinishSound();
    }

    function randomQuote() {
      const index = Math.floor(Math.random() * quotes.length);
      return quotes[index];
    }

    function playTone(frequency, duration, type = "square") {
      try {
        const audioContext = new AudioContext();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.frequency.value = frequency;
        oscillator.type = type;

        gainNode.gain.setValueAtTime(0.22, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

        oscillator.start();
        oscillator.stop(audioContext.currentTime + duration);
      } catch (error) {
        console.log("알림음을 재생할 수 없습니다.");
      }
    }

    function playResetSound() {
      playTone(720, 0.12, "sine");
    }

    function playViolationSound() {
      playTone(220, 0.55, "sawtooth");
    }

    function playFinishSound() {
      playTone(880, 0.7, "square");
    }

    updateDisplay();
  </script>
</body>
</html>
